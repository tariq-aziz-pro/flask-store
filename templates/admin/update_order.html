{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    {% include "admin/_navbar.html" %}

    <div class="card shadow-sm p-4">

        <h3>🚚 Update Order #{{ order.id }}</h3>

        <form method="POST">

            <!-- DELIVERY STATUS -->
            <label class="form-label">Delivery Status</label>
            <select name="status" class="form-control mb-3">

                <option value="Pending"
                    {% if order.status == "Pending" %}selected{% endif %}>
                    🟡 Pending
                </option>

                <option value="On the Way"
                    {% if order.status == "On the Way" %}selected{% endif %}>
                    🚚 On the Way
                </option>

                <option value="Delivered"
                    {% if order.status == "Delivered" %}selected{% endif %}>
                    🟢 Delivered
                </option>

                <option value="Returned"
                    {% if order.status == "Returned" %}selected{% endif %}>
                    🔴 Returned
                </option>

            </select>

            <!-- COURIER -->
            <label class="form-label">Courier Company</label>
            <input name="courier_name"
                   class="form-control mb-3"
                   value="{{ order.courier_name or '' }}">

            <label class="form-label">Courier Contact</label>
            <input name="courier_contact"
                   class="form-control mb-3"
                   value="{{ order.courier_contact or '' }}">

            <!-- 💰 COD STATUS -->
            <label class="form-label">COD Status</label>
            <select name="cash_status" class="form-control mb-4">

                <option value="Not Received"
                    {% if order.cash_status == "Not Received" %}selected{% endif %}>
                    ❌ Not Received
                </option>

                <option value="Received from Courier"
                    {% if order.cash_status == "Received from Courier" %}selected{% endif %}>
                    💰 Received from Courier
                </option>

            </select>

            <button class="btn btn-success w-100">
                ✅ Update Order
            </button>

        </form>

    </div>

</div>

{% endblock %}
